<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invalid Link - Control Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class', theme: { extend: { colors: { surface: { 900:'#0f1117', 800:'#1a1d2e' } } } } }
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
    <link rel="icon" href="{{url}}/img/icon.png" type="image/png">
    <style>
        .bg-grid { background-image: linear-gradient(rgba(59,130,246,0.04) 1px, transparent 1px), linear-gradient(90deg, rgba(59,130,246,0.04) 1px, transparent 1px); background-size: 40px 40px; }
        .glass { background: rgba(255,255,255,0.04); backdrop-filter: blur(16px); border: 1px solid rgba(255,255,255,0.07); }
    </style>
</head>
<body class="dark:bg-surface-900 bg-gray-50 min-h-screen flex items-center justify-center bg-grid">
    <div class="text-center px-4">
        <div class="glass rounded-3xl p-12 max-w-md mx-auto">
            <div class="w-20 h-20 rounded-2xl bg-red-500/20 flex items-center justify-center mx-auto mb-6 border border-red-500/20">
                <i class="fas fa-unlink text-3xl text-red-400"></i>
            </div>
            <img src="{{url}}/img/logo.png" alt="Logo" class="h-10 object-contain mx-auto mb-6 opacity-60" onerror="this.style.display='none'" />
            <h1 class="text-6xl font-black text-gray-700 dark:text-gray-600 mb-3">404</h1>
            <h2 class="text-xl font-bold dark:text-white text-gray-800 mb-2">Invalid Link</h2>
            <p class="text-sm dark:text-gray-400 text-gray-500 mb-8">You have reached an invalid or expired link. If you think this is an error, please contact the server admin.</p>
            <a href="?" class="inline-flex items-center gap-2 px-6 py-3 bg-blue-600 hover:bg-blue-700 text-white rounded-xl font-semibold transition-all duration-200 text-sm shadow-lg shadow-blue-600/20">
                <i class="fas fa-home"></i> Back to Control Panel
            </a>
        </div>
    </div>
    <script>
        (function() { if (localStorage.getItem('cwp-theme') === 'light') { document.documentElement.classList.remove('dark'); } })();
    </script>
</body>
</html>
