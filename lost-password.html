<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{langmod.LGLLABEL1}} - Reset Password</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: { colors: { primary: { 400:'#60a5fa',500:'#3b82f6',600:'#2563eb',700:'#1d4ed8' }, surface: { 900:'#0f1117',800:'#1a1d2e',700:'#242840' } } } }
        }
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
    <link href="{{url}}/css/plugins/toastr/toastr.min.css" rel="stylesheet"/>
    <link rel="icon" href="{{url}}/img/icon.png" type="image/png"/>
    <style>
        .glass { background: rgba(255,255,255,0.05); backdrop-filter: blur(16px); border: 1px solid rgba(255,255,255,0.08); }
        .glow { box-shadow: 0 0 40px rgba(59,130,246,0.12), 0 20px 60px rgba(0,0,0,0.4); }
        .bg-grid { background-image: linear-gradient(rgba(59,130,246,0.05) 1px, transparent 1px), linear-gradient(90deg, rgba(59,130,246,0.05) 1px, transparent 1px); background-size: 40px 40px; }
        .input-field { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); transition: border-color 0.2s, box-shadow 0.2s; }
        .input-field:focus { border-color: #3b82f6; box-shadow: 0 0 0 3px rgba(59,130,246,0.15); outline: none; }
    </style>
</head>
<body class="dark:bg-surface-900 bg-gray-50 min-h-screen flex items-center justify-center bg-grid transition-colors duration-300">

    <button onclick="toggleTheme()" class="absolute top-5 right-5 z-50 p-2.5 rounded-xl glass dark:text-gray-300 text-gray-600 hover:text-primary-400 transition-all duration-200">
        <i class="fas fa-sun dark:block hidden"></i>
        <i class="fas fa-moon dark:hidden block"></i>
    </button>

    <div class="w-full max-w-md px-4 relative z-10">
        <div class="glass glow rounded-2xl p-8">

            <div class="text-center mb-8">
                <div class="w-16 h-16 bg-primary-600/20 rounded-2xl flex items-center justify-center mx-auto mb-4 border border-primary-500/30">
                    <i class="fas fa-key text-2xl text-primary-400"></i>
                </div>
                <h1 class="text-2xl font-bold dark:text-white text-gray-800">Reset Password</h1>
                <p class="text-sm dark:text-gray-400 text-gray-500 mt-1">Enter your username to receive reset instructions</p>
            </div>

            <div id="alert-area" class="hidden mb-4 px-4 py-3 rounded-xl text-sm flex items-center gap-2"></div>

            <form id="lostpassform" action="{{url_ajax}}" method="post">
                <input type="hidden" name="action" value="lost_password" />

                <div class="mb-4">
                    <label class="block text-sm font-medium dark:text-gray-300 text-gray-600 mb-1.5">Username</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 pl-3.5 flex items-center dark:text-gray-400 text-gray-400 pointer-events-none">
                            <i class="fas fa-user text-sm"></i>
                        </span>
                        <input type="text" name="username" id="username"
                            class="w-full pl-10 pr-4 py-3 rounded-xl input-field dark:text-white text-gray-800 dark:placeholder-gray-500 placeholder-gray-400 text-sm"
                            placeholder="Enter your username" />
                    </div>
                </div>

                <button type="submit" id="submit-btn"
                    class="w-full py-3 px-6 bg-gradient-to-r from-primary-600 to-primary-700 hover:from-primary-500 hover:to-primary-600 text-white font-semibold rounded-xl transition-all duration-200 flex items-center justify-center gap-2 text-sm shadow-lg">
                    <i class="fas fa-paper-plane"></i> Send Reset Link
                </button>
            </form>

            <div class="mt-6 text-center">
                <a href="?" class="text-sm text-primary-400 hover:text-primary-300 transition-colors inline-flex items-center gap-1">
                    <i class="fas fa-arrow-left text-xs"></i> Back to Login
                </a>
            </div>
        </div>
    </div>

    <script src="{{url}}/js/jquery-3.1.1.min.js"></script>
    <script src="{{url}}/js/plugins/toastr/toastr.min.js"></script>
    <script>
        function toggleTheme() {
            document.documentElement.classList.toggle('dark');
            localStorage.setItem('cwp-theme', document.documentElement.classList.contains('dark') ? 'dark' : 'light');
        }
        (function() {
            if (localStorage.getItem('cwp-theme') === 'light') document.documentElement.classList.remove('dark');
        })();

        $('#lostpassform').on('submit', function(e) {
            e.preventDefault();
            var $btn = $('#submit-btn');
            $btn.prop('disabled', true).html('<i class="fas fa-circle-notch fa-spin"></i> Sending...');
            $.ajax({
                type: 'POST', url: '{{url_ajax}}', data: $(this).serialize(), dataType: 'json',
                success: function(data) {
                    $btn.prop('disabled', false).html('<i class="fas fa-paper-plane"></i> Send Reset Link');
                    var $alert = $('#alert-area');
                    if (data.status === 'ok') {
                        $alert.attr('class', 'mb-4 px-4 py-3 rounded-xl text-sm flex items-center gap-2 bg-emerald-500/20 border border-emerald-500/30 text-emerald-300');
                        $alert.html('<i class="fas fa-check-circle flex-shrink-0"></i><span>' + (data.msg || 'Reset instructions sent to your email.') + '</span>').removeClass('hidden');
                    } else {
                        $alert.attr('class', 'mb-4 px-4 py-3 rounded-xl text-sm flex items-center gap-2 bg-red-500/20 border border-red-500/30 text-red-300');
                        $alert.html('<i class="fas fa-exclamation-triangle flex-shrink-0"></i><span>' + (data.msg || 'Error occurred.') + '</span>').removeClass('hidden');
                    }
                }
            });
        });
    </script>
</body>
</html>
